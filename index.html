<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayerJS Test</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .player-shell {
      width: 100%;
      aspect-ratio: 16 / 9;
      min-height: 360px;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .meta {
      margin-top: 16px;
      padding: 12px 14px;
      background: #1b1b1b;
      border: 1px solid #2b2b2b;
      border-radius: 10px;
      line-height: 1.5;
      word-break: break-word;
    }

    code {
      font-family: Consolas, monospace;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="player-shell">
      <div id="player"></div>
    </div>
    <div class="meta">
      Source: <code id="stream-url"></code>
    </div>
  </main>

  <script src="playerjs.js"></script>
  <script>
    (function () {
      const defaultHlsUrl = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";
      const searchParams = new URLSearchParams(window.location.search);
      const streamUrl = searchParams.get("src") || defaultHlsUrl;

      document.getElementById("stream-url").textContent = streamUrl;

      window.player = new Playerjs({
        id: "player",
        file: streamUrl
      });
    })();
  </script>
</body>
</html>
